<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="utf-8" />
  <title>V-Map–ES2017–Builder–HTML Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: system-ui, sans-serif;
    }

    #map-host {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    #map-host v-map-builder {
      display: block;
      width: 100%;
      height: 100%;
    }

    #map-host v-map {
      display: block;
      width: 100%;
      height: 100%;
    }

    #map-host v-map-layercontrol {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
    }
  </style>
</head>

<body>
  <div id="map-host">
    <v-map-builder>
      <script slot="mapconfig" type="application/yaml">
map:
  id: map1
  flavour: ol
  zoom: 10
  center: "11.1,49.4"
  style: "display:block;width:100%;height:100%;"
  layerGroups:
    - groupTitle: Basiskarten
      basemapid: OSM-BASE 
      layers:
        - id: OSM-BASE
          type: osm
          label: OpenStreetMap
          visible: true
        - id: OSM-BASE-DE
          type: osm
          label: OpenStreetMap DE
          url: https://tile.openstreetmap.de/
          visible: true
      </script>
    </v-map-builder>
    <v-map-layercontrol for="map1"></v-map-layercontrol>
  </div>

  <script type="module">
    const loader = await import('../../loader/index.es2017.js');
    loader.defineCustomElements();
  </script>
</body>

</html>
