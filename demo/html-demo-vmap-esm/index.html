<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="utf-8" />
  <title>V-Map – HTML Demo - VMAP ESM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script type="module" src="../../dist/v-map/v-map.esm.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: system-ui, sans-serif;
    }

    v-map {
      display: block;
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>
  <v-map flavour="ol">
    <v-map-layergroup group-title="Basiskarten" basemapid="OSM-BASE">
      <v-map-layer-osm id="OSM-BASE" label="OpenStreetMap" z-index="0" opacity="1.0">
      </v-map-layer-osm>
    </v-map-layergroup>
  </v-map>
</body>

</html>
