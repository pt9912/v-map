<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>v-map CDN Demo: OSM + GeoJSON</title>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@npm9912/v-map@0.2.0/dist/v-map/v-map.esm.js"
    ></script>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      }
      v-map {
        display: block;
        width: 100%;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <v-map flavour="ol" center="10.0,51.0" zoom="6">
      <v-map-error position="top-right" auto-dismiss="6000"></v-map-error>

      <v-map-layergroup group-title="Basiskarten" basemapid="OSM-BASE">
        <v-map-layer-osm
          id="OSM-BASE"
          label="OpenStreetMap"
          z-index="0"
          opacity="1.0"
        ></v-map-layer-osm>
      </v-map-layergroup>

      <v-map-layergroup group-title="Daten">
        <v-map-layer-geojson
          url="https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson"
          fill-color="#0066cc"
          fill-opacity="0.2"
          stroke-color="#003366"
          stroke-width="1"
        ></v-map-layer-geojson>
      </v-map-layergroup>
    </v-map>
  </body>
</html>
