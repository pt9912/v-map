name: Docs
on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'docs/**'
      - 'examples/**'
      - 'scripts/build-examples.mjs'
      - 'stencil.config.ts'
      - 'typedoc.json'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Build v-map main library FIRST so dist/ and loader/ exist - the
      # example workspaces under examples/* depend on them via file:../../
      # and sync them via their own sync:vmap script.
      - run: pnpm prebuild
      - run: pnpm build
      # docs:build runs docs:stencil + docs:ts + docs:api + docs:examples
      # + vitepress build, in that order. docs:examples sequentially
      # builds every workspace under examples/ and copies its static
      # output into docs/public/demos/<name>/.
      #
      # TODO: when 3+ examples land, split docs:examples into a parallel
      # matrix job that uploads each example as an artifact, and have
      # the docs build job download all artifacts before vitepress runs.
      - run: pnpm docs:build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
