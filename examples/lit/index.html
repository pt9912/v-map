<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>v-map Lit Demo</title>
    <style>
      /*
        Reset the iframe's top-level document. The <vmap-showcase>
        Lit element is sized to 100dvh on :host, but those styles
        live inside a shadow root and don't affect the parent
        document. Without this reset the browser adds the default
        body margin (8px) plus the full 100dvh element, which
        overflows and paints a scrollbar on the iframe.
      */
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }
    </style>
    <!--
      Load v-map directly from jsDelivr at runtime instead of bundling
      it through Vite. Stencil's lazy loader uses import.meta.url to
      find its sibling *.entry.js chunks; if Vite bundles the loader,
      that URL ends up under /assets/... and Stencil 404s on every
      layer chunk. Loading the published v-map.esm.js from jsDelivr
      keeps Stencil's chunk resolution intact.

      Pin the version explicitly so the demo behaves identically across
      deploys; bump in lockstep with v-map releases.
    -->
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@npm9912/v-map@0.4.3/dist/v-map/v-map.esm.js"
    ></script>
  </head>
  <body>
    <!--
      The Lit element is the entire showcase. Once Lit's
      customElements.define() runs (triggered by the import below),
      this tag upgrades into a real component that renders the
      controls + the inner <v-map>.
    -->
    <vmap-showcase></vmap-showcase>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
