<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>v-map Angular Demo</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--
      Load v-map directly from jsDelivr at runtime instead of bundling
      it through esbuild. Stencil's lazy loader uses import.meta.url to
      find its sibling *.entry.js chunks; if Angular bundles the loader,
      that URL ends up in the wrong place and Stencil 404s on every layer
      chunk.
    -->
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@npm9912/v-map@0.4.4/dist/v-map/v-map.esm.js"
    ></script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
